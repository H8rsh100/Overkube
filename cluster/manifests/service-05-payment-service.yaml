# ─────────────────────────────────────────────────
# UNDER-PROVISIONED SERVICE 2 — payment-service
# Requests only 50% of actual need → will show throttling
# Typical real usage: ~100m CPU, ~160Mi mem
# ─────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: overkube
  labels:
    app: payment-service
    tier: backend
    waste-profile: under-provisioned
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
        tier: backend
        waste-profile: under-provisioned
    spec:
      containers:
        - name: echo
          image: hashicorp/http-echo:latest
          args: ["-text=payment-service", "-listen=:8080"]
          ports:
            - containerPort: 8080
          env:
            - name: SERVICE_NAME
              value: payment-service
          resources:
            requests:
              cpu: "50m"
              memory: "80Mi"
            limits:
              cpu: "80m"
              memory: "120Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: overkube
spec:
  selector:
    app: payment-service
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
