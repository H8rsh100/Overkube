# ─────────────────────────────────────────────────
# OVER-PROVISIONED SERVICE 1 — api-gateway
# Requests 4x what it actually needs.
# Typical real usage: ~50m CPU, ~64Mi mem
# ─────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: overkube
  labels:
    app: api-gateway
    tier: frontend
    waste-profile: over-provisioned
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
        tier: frontend
        waste-profile: over-provisioned
    spec:
      containers:
        - name: echo
          image: hashicorp/http-echo:latest
          args: ["-text=api-gateway", "-listen=:8080"]
          ports:
            - containerPort: 8080
          env:
            - name: SERVICE_NAME
              value: api-gateway
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: overkube
spec:
  selector:
    app: api-gateway
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
