# ─────────────────────────────────────────────────
# UNDER-PROVISIONED SERVICE 3 — search-service
# Requests only 50% of actual need → will show throttling
# Typical real usage: ~140m CPU, ~200Mi mem
# ─────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: search-service
  namespace: overkube
  labels:
    app: search-service
    tier: backend
    waste-profile: under-provisioned
spec:
  replicas: 1
  selector:
    matchLabels:
      app: search-service
  template:
    metadata:
      labels:
        app: search-service
        tier: backend
        waste-profile: under-provisioned
    spec:
      containers:
        - name: echo
          image: hashicorp/http-echo:latest
          args: ["-text=search-service", "-listen=:8080"]
          ports:
            - containerPort: 8080
          env:
            - name: SERVICE_NAME
              value: search-service
          resources:
            requests:
              cpu: "70m"
              memory: "100Mi"
            limits:
              cpu: "120m"
              memory: "150Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: search-service
  namespace: overkube
spec:
  selector:
    app: search-service
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
