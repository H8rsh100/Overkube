# ─────────────────────────────────────────────────
# RIGHT-SIZED SERVICE 1 — auth-service (control group)
# Requests match actual usage closely.
# Typical real usage: ~50m CPU, ~64Mi mem
# ─────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: overkube
  labels:
    app: auth-service
    tier: backend
    waste-profile: right-sized
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
        tier: backend
        waste-profile: right-sized
    spec:
      containers:
        - name: echo
          image: hashicorp/http-echo:latest
          args: ["-text=auth-service", "-listen=:8080"]
          ports:
            - containerPort: 8080
          env:
            - name: SERVICE_NAME
              value: auth-service
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "80m"
              memory: "96Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: overkube
spec:
  selector:
    app: auth-service
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
